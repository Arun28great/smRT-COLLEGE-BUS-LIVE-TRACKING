name: smart_college_bus_live_tracking
description: "College bus tracking app with real-time GPS tracking, AI Assistant, notifications, and secure user profiles."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Maps and Location Services
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0

  # Database Integration
  mongo_dart: ^0.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
